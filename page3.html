<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Monthsary</title>
  <link rel="stylesheet" href="page3.css" />
</head>
<body>

  <!-- Tulip shape used by every falling piece -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <symbol id="tulip-shape" viewBox="0 0 40 40">
        <path d="M20 4c-4.2 0-6.4 3.9-6.4 7.6 0 2 .8 3.9 2 5.2-3.4 1.1-6.4 4.3-6.4 8.2h21.6c0-3.9-3-7.1-6.4-8.2 1.2-1.3 2-3.2 2-5.2C26.4 7.9 24.2 4 20 4z" fill="currentColor"/>
        <rect x="19" y="24.5" width="2" height="11" rx="1" fill="currentColor"/>
        <path d="M20 30.5c-2.6-.7-4.6-3.3-4.6-3.3s2.7-.2 4.6 1.7z" fill="currentColor"/>
      </symbol>
    </defs>
  </svg>

  <div id="page3">
    <div class="tulip-field"></div>

    <div class="p3-inner">
      <img class="p3-icon" src="assets/cute-icon.png" alt="" />

      <h1 class="p3-title">Happy</h1>
      <div class="p3-months">43rd Monthsary</div>
      <p class="p3-sub">I love you so much.</p>
    </div>
  </div>

  <script>
    function spawnTulips() {
      const field = document.querySelector('.tulip-field');
      const colors = ['#c98a89', '#a8615f', '#d9a9a3', '#e7c3bd'];
      const count = 26;

      for (let i = 0; i < count; i++) {
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        el.classList.add('tulip-piece');
        el.setAttribute('viewBox', '0 0 40 40');

        const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
        use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#tulip-shape');
        el.appendChild(use);

        const size = 14 + Math.random() * 12;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.left = Math.random() * 100 + '%';
        el.style.color = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (7 + Math.random() * 6) + 's';
        el.style.animationDelay = (Math.random() * 8) + 's';

        field.appendChild(el);
      }
    }

    document.addEventListener('DOMContentLoaded', spawnTulips);
  </script>

</body>
</html>
