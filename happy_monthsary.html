<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 43rd Monthsary</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="confetti.css" />
  <link rel="stylesheet" href="page3-style.css" />
</head>
<body>

  <!-- Same floating confetti field as the question page -->
  <div class="tulip-confetti-field" id="confettiField"></div>

  <!-- Hero decor: tulip photos only — no hearts/ribbons on this page -->
  <div class="decor-layer hero-decor" id="decorLayer" aria-hidden="true">
    <div class="decor-img hd-tulip-1"><img src="images/tulip-1.png" alt="" /></div>
    <div class="decor-img hd-tulip-2"><img src="images/tulip-2.png" alt="" /></div>
    <div class="decor-img hd-tulip-3"><img src="images/tulip-3.png" alt="" /></div>
  </div>

  <main id="page3">
    <div class="p3-inner">

      <div class="bouquet" aria-hidden="true">
        <img src="images/tulip-3.png" alt="" />
      </div>
      <h1 class="p3-title">Happy</h1>
      <div class="p3-months">43rd Monthsary</div>
      <h1 class="p3-title">My Love</h1>

      <p class="p3-sub">I love you so much, today, tomorrow, and every day, month, and year to come.</p>
    </div>
  </main>

  <script src="confetti.js"></script>
  <script src="page3-script.js"></script>
</body>
</html>
