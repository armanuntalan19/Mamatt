<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Still Love Me?</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="confetti.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Slow floating confetti, filled in by confetti.js -->
  <div class="tulip-confetti-field" id="confettiField"></div>

  <!-- Hero decor: hearts, ribbon & tulip photos — index page only.
       Two tulip bouquets anchor the bottom corners, hearts frame the
       top corners, one ribbon accents the top edge. tulip-2's source
       photo is cropped on its left side, so it's mirrored (scaleX(-1))
       and always kept on the right, where the cropped edge bleeds
       off-screen instead of showing. -->
  <div class="decor-layer hero-decor" id="decorLayer" aria-hidden="true">
    <div class="decor-img hd-heart-l"><img src="lace-heart.svg" alt="" /></div>
    <div class="decor-img hd-heart-r"><div class="img-flip"><img src="gem-chain.svg" alt="" /></div></div>
    <div class="decor-img hd-ribbon"><img src="ribbon.png" alt="" /></div>
    <div class="decor-img hd-tulip-1"><img src="tulip-1.png" alt="" /></div>
    <div class="decor-img hd-tulip-2"><div class="img-flip"><img src="tulip-2.png" alt="" /></div></div>
  </div>

  <main class="stage">
    <div class="card">

      <div class="bouquet" aria-hidden="true">
        <img src="tulip-3.png" alt="" />
      </div>

      <img src="icon.png" alt="A pleading pup, hoping for a yes" class="portrait" />

      <p class="eyebrow">a question, my love</p>
      <h1 class="title">Do you still<br /><em>love</em> me?</h1>

      <div class="btn-field">
        <button id="yesBtn" class="btn btn-yes" type="button">Yes</button>
        <button id="noBtn" class="btn btn-no" type="button">No</button>
      </div>
    </div>
  </main>

  <script src="confetti.js"></script>
  <script src="script.js"></script>
</body>
</html>
