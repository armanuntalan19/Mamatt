<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Still Love Me?</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="confetti.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Slow floating confetti, filled in by confetti.js -->
  <div class="tulip-confetti-field" id="confettiField"></div>

  <!-- Hero decor: hearts, ribbon & tulip photos — index page only -->
  <div class="decor-layer hero-decor" id="decorLayer" aria-hidden="true">
    <div class="decor-img hd-heart-l"><img src="images/heart.png" alt="" /></div>
    <div class="decor-img hd-heart-r"><img src="images/heart.png" alt="" /></div>
    <div class="decor-img hd-ribbon-l"><img src="images/ribbon.png" alt="" /></div>
    <div class="decor-img hd-ribbon-r"><img src="images/ribbon.png" alt="" /></div>
    <div class="decor-img hd-tulip-1"><img src="images/tulip-1.png" alt="" /></div>
    <div class="decor-img hd-tulip-2"><img src="images/tulip-2.png" alt="" /></div>
    <div class="decor-img hd-tulip-3"><img src="images/tulip-3.png" alt="" /></div>
  </div>

  <main class="stage">
    <div class="card">

      <div class="bouquet" aria-hidden="true">
        <img src="images/tulip-3.png" alt="" />
      </div>

      <img src="icon.png" alt="A pleading pup, hoping for a yes" class="portrait" />

      <p class="eyebrow">a question, my love</p>
      <h1 class="title">Do you still<br /><em>love</em> me?</h1>

      <div class="btn-field">
        <button id="yesBtn" class="btn btn-yes" type="button">Yes</button>
        <button id="noBtn" class="btn btn-no" type="button">No</button>
      </div>
    </div>
  </main>

  <script src="confetti.js"></script>
  <script src="script.js"></script>
</body>
</html>
