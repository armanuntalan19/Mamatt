<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Still Love Me? 💕</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════════
       FLOATING TULIPS (fixed, always visible)
       ════════════════════════════════════════════════ -->
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>

  <!-- ════════════════════════════════════════════════
       YES TAKEOVER OVERLAY
       Shows when NO is clicked enough times
       ════════════════════════════════════════════════ -->
  <div class="yes-takeover" id="yesTakeover">
    <button id="overlayYesBtn">💕 YES! 💕</button>
    <p>I knew it 🌷</p>
  </div>

  <!-- ════════════════════════════════════════════════
       PAGE 1 — The Question
       ════════════════════════════════════════════════ -->
  <div id="page1" class="page active">
    <div class="p1-petals"></div>

    <div class="q-wrapper">

      <!-- Minimal icon: the uploaded pleading-pup image -->
      <img src="icon.png" alt="Pleading pup" class="q-icon" />

      <!-- The question -->
      <p class="q-title">Do you still love me?</p>

      <!-- Yes / No buttons — fixed slots, no layout shift on resize -->
      <div class="q-btn-area">
        <div class="btn-slot">
          <button id="yesBtn">Yes 💕</button>
        </div>
        <div class="btn-slot">
          <button id="noBtn">No 🙈</button>
        </div>
      </div>

    </div>
  </div><!-- end page1 -->

  <script src="script.js"></script>
</body>
</html>
