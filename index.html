<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Still Love Me? 💕</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════════
       FLOATING TULIPS (fixed, always visible)
       ════════════════════════════════════════════════ -->
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>
  <div class="tulip-float">🌷</div>

  <!-- ════════════════════════════════════════════════
       PAGE 1 — The Question
       ════════════════════════════════════════════════ -->
  <div id="page1" class="page active">
    <div class="p1-petals"></div>

    <div class="q-wrapper">

      <!-- Minimal icon: the uploaded pleading-pup image -->
      <img src="icon.png" alt="Pleading pup" class="q-icon" />

      <!-- The question -->
      <p class="q-title">Do you still love me?</p>

      <!-- Yes / No buttons — free-flowing, YES grows for real and the
           layout adapts around it as NO gets clicked -->
      <div class="q-btn-area" id="btnArea">
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 🙈</button>
      </div>

    </div>
  </div><!-- end page1 -->

  <script src="script.js"></script>
</body>
</html>
