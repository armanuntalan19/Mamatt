<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Still Love Me?</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="confetti.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Slow floating confetti, filled in by confetti.js -->
  <div class="tulip-confetti-field" id="confettiField"></div>

  <!-- Hero decor: hearts, ribbon & gem chain — index page only.
       No tulip photos here (those are reserved for the falling
       confetti); heart and chain anchor the top corners, ribbon
       accents the top edge, all sized up to fill the space the
       tulips used to occupy. -->
  <div class="decor-layer hero-decor" id="decorLayer" aria-hidden="true">
    <div class="decor-img hd-heart-l"><img src="lace-heart.svg" alt="" /></div>
    <div class="decor-img hd-heart-r"><div class="img-flip"><img src="gem-chain.svg" alt="" /></div></div>
    <div class="decor-img hd-ribbon"><img src="ribbon.png" alt="" /></div>
    <div class="decor-img hd-ribbon-2"><div class="img-flip"><img src="ribbon.png" alt="" /></div></div>
  </div>

  <main class="stage">
    <div class="card">

      <img src="icon.png" alt="A pleading pup, hoping for a yes" class="portrait" />

      <p class="eyebrow">a question, my love</p>
      <h1 class="title">Do you still<br /><em>love</em> me?</h1>

      <div class="btn-field">
        <button id="yesBtn" class="btn btn-yes" type="button">Yes</button>
        <button id="noBtn" class="btn btn-no" type="button">No</button>
      </div>
    </div>
  </main>

  <script src="confetti.js"></script>
  <script src="script.js"></script>
</body>
</html>
