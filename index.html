<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Still Love Me?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="page1">
    <div class="q-wrapper">

      <!-- Replace assets/cute-icon.png with your own icon -->
      <img class="q-icon" src="assets/cute-icon.png" alt="" />

      <p class="q-title">Do you still love me?</p>

      <div class="q-btn-area">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
      </div>

    </div>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn  = document.getElementById('noBtn');

    let noClicks = 0;
    const takeoverAt = 6; // how many NO clicks before YES fills the screen

    noBtn.addEventListener('click', () => {
      if (yesBtn.classList.contains('yes-fullscreen')) return;

      noClicks++;

      if (noClicks >= takeoverAt) {
        yesBtn.classList.add('yes-fullscreen');
        noBtn.style.display = 'none';
        return;
      }

      // YES only scales up from its own fixed anchor point —
      // it never shifts position, so NO never has to move either.
      const scale = 1 + noClicks * 0.28;
      yesBtn.style.transform = `translate(-50%, -50%) scale(${scale})`;

      // NO gives quiet feedback but stays exactly in place.
      noBtn.style.opacity = Math.max(0.35, 1 - noClicks * 0.12);
    });

    yesBtn.addEventListener('click', () => {
      window.location.href = 'page3.html';
    });
  </script>

</body>
</html>
